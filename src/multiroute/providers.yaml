# Domain-to-provider registry.
# When a request is made without a provider prefix (e.g. "gpt-4o" instead of
# "openai/gpt-4o"), the resolver extracts the hostname from the client's
# base_url and looks it up in this map to prepend the correct provider so the
# Multiroute proxy knows how to route the request.
#
# Keys are exact hostnames (case-insensitive).  Add a new entry here whenever
# a new provider or deployment domain needs to be supported.

providers:
  api.openai.com: openai
  api.groq.com: groq
  api.anthropic.com: anthropic
  generativelanguage.googleapis.com: google
  api.mistral.ai: mistral
  api.cohere.com: cohere
  api.cohere.ai: cohere
  api.deepseek.com: deepseek
  api.x.ai: xai
  api.together.xyz: together
  api.fireworks.ai: fireworks
  api.perplexity.ai: perplexity
  openrouter.ai: openrouter
  api.cerebras.ai: cerebras
  inference.ai.azure.com: azure
  api.cognitive.microsoft.com: azure
  openai.azure.com: azure
